{% extends 'base.html' %}
{% block content %}
<h1 class="text-3xl font-bold text-gray-800 mb-6">🔀 Pengurutan Data Mahasiswa</h1>

<!-- Kontrol Pengurutan -->
<div class="mb-6 flex flex-wrap gap-4 bg-white p-4 rounded-lg shadow-sm max-w-2xl">
    <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Urutkan Berdasarkan:</label>
        <select id="sort-by" onchange="aksiUrut()" class="p-2 border rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="nama">Nama</option>
            <option value="ipk">IPK</option>
            <option value="semester">Semester</option>
        </select>
    </div>
    <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Metode Urutan:</label>
        <select id="sort-order" onchange="aksiUrut()" class="p-2 border rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="asc">A-Z / Terendah (Ascending)</option>
            <option value="desc">Z-A / Tertinggi (Descending)</option>
        </select>
    </div>
</div>

<!-- Tabel Hasil Urutan -->
<div class="bg-white rounded-lg shadow overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">NIM</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nama</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Jurusan</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Sem.</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">IPK</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Gender</th>
            </tr>
        </thead>
        <tbody id="hasil-urut-body" class="divide-y divide-gray-200"></tbody>
    </table>
</div>

<script>
    async function aksiUrut() {
        const sortBy = document.getElementById('sort-by').value;
        const sortOrder = document.getElementById('sort-order').value;
        
        // Memanggil API backend untuk mengambil data yang sudah terurut
        const res = await fetch(`/api/mahasiswa/urut?by=${sortBy}&order=${sortOrder}`);
        const data = await res.json();
        
        const tbody = document.getElementById('hasil-urut-body');
        tbody.innerHTML = '';
        
        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">Belum ada data mahasiswa untuk diurutkan.</td></tr>`;
            return;
        }

        data.forEach(m => {
            tbody.innerHTML += `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-semibold text-gray-900">${m.nim}</td>
                    <td class="px-6 py-4 capitalize">${m.nama}</td>
                    <td class="px-6 py-4 capitalize">${m.jurusan}</td>
                    <td class="px-6 py-4">${m.semester}</td>
                    <td class="px-6 py-4 text-indigo-600 font-bold">${m.ipk.toFixed(2)}</td>
                    <td class="px-6 py-4">${m.gender == 'L' ? '♂ L' : '♀ P'}</td>
                </tr>`;
        });
    }

    // Panggil otomatis saat halaman pengurutan pertama kali dibuka
    document.addEventListener("DOMContentLoaded", aksiUrut);
</script>
{% endblock %}
