{% extends 'base.html' %}
{% block content %}
<h1 class="text-3xl font-bold text-gray-800 mb-6">🔍 Pencarian Data Mahasiswa</h1>

<!-- Input Pencarian -->
<div class="mb-6 max-w-md">
    <input type="text" id="search-input" oninput="aksiCari()" placeholder="Ketik NIM atau Nama di sini untuk mencari..." 
           class="w-full p-2.5 border rounded-lg shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none">
</div>

<!-- Tabel Hasil -->
<div class="bg-white rounded-lg shadow overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">NIM</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nama</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Jurusan</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Sem.</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">IPK</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Gender</th>
            </tr>
        </thead>
        <tbody id="hasil-cari-body" class="divide-y divide-gray-200"></tbody>
    </table>
</div>

<script>
    async function aksiCari() {
        const query = document.getElementById('search-input').value;
        const res = await fetch(`/api/mahasiswa/cari?q=${encodeURIComponent(query)}`);
        const data = await res.json();
        
        const tbody = document.getElementById('hasil-cari-body');
        tbody.innerHTML = '';
        
        if(data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-red-500 font-semibold">Data mahasiswa atau NIM tidak ditemukan.</td></tr>`;
            return;
        }

        data.forEach(m => {
            tbody.innerHTML += `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-semibold text-gray-900">${m.nim}</td>
                    <td class="px-6 py-4 uppercase">${m.nama}</td>
                    <td class="px-6 py-4 capitalize">${m.jurusan}</td>
                    <td class="px-6 py-4">${m.semester}</td>
                    <td class="px-6 py-4 text-indigo-600 font-bold">${m.ipk.toFixed(2)}</td>
                    <td class="px-6 py-4">${m.gender == 'L' ? '♂ L' : '♀ P'}</td>
                </tr>`;
        });
    }

    // Panggil otomatis saat halaman pertama kali dimuat
    aksiCari();
</script>
{% endblock %}
